---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: tekton-caches-python-pipeline
spec:
  params:
    - name: repo_url
    - name: revision
      type: string
      default: main
    - name: registry
      type: string
    - name: cachePatterns
      type: array
      default: ["**requirements.txt"]
    - name: image
      type: string
      default: quay.io/openshift-pipeline/ci:latest
    - name: force-cache-upload
      type: string
      default: "false"
  workspaces:
    - name: source
  tasks:
    - displayName: Build Python Application
      name: build-task
      workspaces:
        - name: source
          workspace: source
      taskSpec:
        workspaces:
          - name: source
        params:
          - name: cachePatterns
            default: $(params.cachePatterns)
          - name: image
            default: $(params.image)
        steps:
          - name: create-repo
            image: $(params.image)
            script: |
              mkdir -p $(workspaces.source.path)/repo
              chmod 777 $(workspaces.source.path)/repo
          - name: clone-repo
            ref:
              resolver: cluster
              params:
              - name: name
                value: git-clone
              - name: namespace
                value: openshift-pipelines
              - name: kind
                value: stepaction
            params:
              - name: OUTPUT_PATH
                value: $(workspaces.source.path)/repo
              - name: URL
                value: $(params.repo_url)
              - name: REVISION
                value: $(params.revision)
          - name: set-python-venv
            image: $(params.image)
            script: |
              echo "Setting python venv to $(workspaces.source.path)/cache"
              python -m venv $(workspaces.source.path)/cache
              chmod -R 777 $(workspaces.source.path)/cache
          - name: cache-fetch
            ref:
              resolver: cluster
              params:
              - name: name
                value: cache-fetch
              - name: namespace
                value: openshift-pipelines
              - name: kind
                value: stepaction
            params:
              - name: patterns
                value: $(params.cachePatterns)
              - name: source
                value: oci://$(params.registry):{{hash}}
              - name: cachePath
                value: $(workspaces.source.path)/cache/lib
              - name: workingdir
                value: $(workspaces.source.path)/repo
          - name: run-build
            image: $(params.image)
            workingDir: $(workspaces.source.path)/repo
            env:
              - name: LOCAL_CACHE_REPO
                value: $(workspaces.source.path)/cache/lib
            script: |
              set -x
              source $(workspaces.source.path)/cache/bin/activate
              pip install -r requirements.txt 
              echo "Cache size is $(du -sh $(workspaces.source.path)/cache)"
          - name: cache-upload
            ref:
              resolver: cluster
              params:
              - name: name
                value: cache-upload
              - name: namespace
                value: openshift-pipelines
              - name: kind
                value: stepaction
            params:
              - name: patterns
                value: $(params.cachePatterns)
              - name: target
                value: oci://$(params.registry):{{hash}}
              - name: cachePath
                value: $(workspaces.source.path)/cache/lib
              - name: workingdir
                value: $(workspaces.source.path)/repo
              - name: force-cache-upload
                value: $(params.force-cache-upload)
              - name: fetched
                value: $(steps.cache-fetch.results.fetched)