apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: jib-maven-pipeline
spec:
  params:
  - name: SUBDIR
    description: where to clone the git repo
    default: jib-maven
  - name: IMAGE
    description: Name of the image to build
    default: quay.io/openshift-pipeline/jib-maven:latest
  workspaces:
  - name: source
  tasks:
  - name: clone-git-repo
    taskRef:
      resolver: cluster
      params:
      - name: kind
        value: task
      - name: name
        value: git-clone
      - name: namespace
        value: openshift-pipelines
    workspaces:
    - name: output
      workspace: source
    params:
    - name: URL
      value: https://github.com/che-samples/console-java-simple
    - name: REVISION
      value: master
    - name: SUBDIRECTORY
      value: $(params.SUBDIR)
    - name: DELETE_EXISTING
      value: "true"
  - name: build
    taskRef:
      resolver: cluster
      params:
      - name: kind
        value: task
      - name: name
        value: jib-maven
      - name: namespace
        value: openshift-pipelines
    runAfter:
    - clone-git-repo
    workspaces:
    - name: source
      workspace: source
    params:
    - name: DIRECTORY
      value: $(params.SUBDIR)
    - name: IMAGE
      value: $(params.IMAGE)
    - name: INSECUREREGISTRY
      value: "true"